<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #050810;
      --bg2: #080d1a;
      --neon-cyan: #00ffe7;
      --neon-green: #39ff14;
      --neon-pink: #ff2d78;
      --neon-blue: #1a8cff;
      --text: #c8d8e8;
      --text-dim: #5a7a9a;
      --border: rgba(0,255,231,0.25);
      --glow-cyan: 0 0 8px #00ffe7, 0 0 20px rgba(0,255,231,0.3);
      --glow-green: 0 0 8px #39ff14, 0 0 20px rgba(57,255,20,0.3);
      --glow-pink: 0 0 8px #ff2d78, 0 0 20px rgba(255,45,120,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* Grid background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,231,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,231,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 60px 24px 100px;
      position: relative;
      z-index: 1;
    }

    /* ── HEADER ── */
    header {
      margin-bottom: 64px;
      animation: fadeDown 0.6s ease both;
    }

    .header-tag {
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--neon-cyan);
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0.7;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 900;
      line-height: 1.1;
      color: #fff;
      text-shadow: var(--glow-cyan);
      letter-spacing: -1px;
    }

    h1 span {
      color: var(--neon-cyan);
    }

    .subtitle {
      margin-top: 16px;
      color: var(--text-dim);
      font-size: 13px;
      letter-spacing: 1px;
      line-height: 1.8;
      max-width: 520px;
    }

    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--neon-cyan);
      margin-left: 4px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
      box-shadow: var(--glow-cyan);
    }

    /* ── SECTION LABEL ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      margin-top: 56px;
    }

    .section-label span {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--neon-green);
      text-shadow: var(--glow-green);
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(57,255,20,0.4), transparent);
    }

    /* ── PROJECT CARD ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 28px 32px;
      margin-bottom: 20px;
      position: relative;
      transition: border-color 0.3s, box-shadow 0.3s;
      animation: fadeUp 0.5s ease both;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: var(--neon-cyan);
      box-shadow: var(--glow-cyan);
      border-radius: 2px 0 0 2px;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      border-color: rgba(0,255,231,0.5);
      box-shadow: 0 0 30px rgba(0,255,231,0.06), inset 0 0 30px rgba(0,255,231,0.02);
    }

    .card-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .card-title {
      font-family: 'Orbitron', monospace;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .card-date {
      font-size: 11px;
      color: var(--neon-pink);
      letter-spacing: 2px;
      text-shadow: var(--glow-pink);
      white-space: nowrap;
    }

    .card ul {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card ul li {
      font-size: 13px;
      color: var(--text);
      line-height: 1.65;
      padding-left: 20px;
      position: relative;
    }

    .card ul li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--neon-cyan);
      font-size: 11px;
      top: 2px;
    }

    /* ── BUTTONS ── */
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 48px;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 12px 24px;
      border: 1px solid var(--neon-cyan);
      background: transparent;
      color: var(--neon-cyan);
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      box-shadow: inset 0 0 0 0 var(--neon-cyan);
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--neon-cyan);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn:hover {
      color: var(--bg);
      text-shadow: none;
      box-shadow: var(--glow-cyan);
    }

    .btn:hover::before { opacity: 1; }
    .btn span { position: relative; z-index: 1; }

    .btn-pink {
      border-color: var(--neon-pink);
      color: var(--neon-pink);
    }
    .btn-pink::before { background: var(--neon-pink); }
    .btn-pink:hover { box-shadow: var(--glow-pink); color: var(--bg); }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5,8,16,0.92);
      backdrop-filter: blur(6px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-top: 2px solid var(--neon-cyan);
      box-shadow: var(--glow-cyan), 0 40px 80px rgba(0,0,0,0.8);
      border-radius: 2px;
      padding: 36px;
      width: 100%;
      max-width: 560px;
      animation: modalIn 0.25s ease both;
    }

    .modal h2 {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--neon-cyan);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 28px;
      text-shadow: var(--glow-cyan);
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-dim);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      background: rgba(0,255,231,0.03);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: vertical;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 0 1px rgba(0,255,231,0.2);
    }

    .form-group textarea { min-height: 100px; }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      justify-content: flex-end;
    }

    /* Bullet list in modal */
    #bullets-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    .bullet-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .bullet-row textarea {
      flex: 1;
      min-height: 60px;
    }

    .remove-bullet {
      background: transparent;
      border: 1px solid rgba(255,45,120,0.4);
      color: var(--neon-pink);
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 2px;
      line-height: 1;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .remove-bullet:hover {
      background: var(--neon-pink);
      color: var(--bg);
    }

    .add-bullet-btn {
      background: transparent;
      border: 1px dashed rgba(0,255,231,0.3);
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 2px;
      width: 100%;
      transition: all 0.2s;
    }

    .add-bullet-btn:hover {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
      font-size: 13px;
      border: 1px dashed rgba(0,255,231,0.1);
      border-radius: 2px;
    }

    .empty-state .icon {
      font-size: 32px;
      display: block;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    /* ── ANIMATIONS ── */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 540px) {
      .card { padding: 20px 18px; }
      .modal { padding: 24px 18px; }
      .card-header { flex-direction: column; gap: 4px; }
    }

    /* Card delete button */
    .card-del {
      position: absolute;
      top: 12px; right: 14px;
      background: transparent;
      border: none;
      color: rgba(255,45,120,0.3);
      font-size: 18px;
      cursor: pointer;
      transition: color 0.2s, text-shadow 0.2s;
      line-height: 1;
      padding: 4px;
    }

    .card-del:hover {
      color: var(--neon-pink);
      text-shadow: var(--glow-pink);
    }

    /* Card edit button */
    .card-edit {
      position: absolute;
      top: 12px; right: 42px;
      background: transparent;
      border: none;
      color: rgba(0,255,231,0.25);
      font-size: 13px;
      cursor: pointer;
      transition: color 0.2s, text-shadow 0.2s;
      line-height: 1;
      padding: 4px;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 1px;
    }

    .card-edit:hover {
      color: var(--neon-cyan);
      text-shadow: var(--glow-cyan);
    }

    /* ── DRAG HANDLE ── */
    .drag-handle {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      cursor: grab;
      padding: 6px 4px;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 2;
    }

    .drag-handle span {
      display: block;
      width: 14px;
      height: 2px;
      background: var(--neon-cyan);
      border-radius: 1px;
      box-shadow: 0 0 4px rgba(0,255,231,0.5);
      transition: width 0.2s;
    }

    .card:hover .drag-handle { opacity: 0.6; }
    .drag-handle:hover { opacity: 1 !important; }
    .drag-handle:active { cursor: grabbing; }
    .drag-handle:hover span:nth-child(2) { width: 10px; }

    /* Card with drag handle needs left padding */
    .card { padding-left: 36px; }

    /* ── DRAG STATES ── */
    .card.dragging {
      opacity: 0.4;
      border-color: var(--neon-cyan);
      box-shadow: var(--glow-cyan);
    }

    .card.drag-over {
      border-color: var(--neon-green);
      box-shadow: 0 0 20px rgba(57,255,20,0.15);
      transform: scale(1.01);
    }

    .card.drag-over::before {
      background: var(--neon-green);
      box-shadow: var(--glow-green);
    }

    /* Drop indicator line */
    .drop-indicator {
      height: 2px;
      background: var(--neon-green);
      box-shadow: var(--glow-green);
      border-radius: 2px;
      margin: -10px 0 8px;
      animation: pulseGreen 1s ease infinite;
      display: none;
    }

    .drop-indicator.visible { display: block; }

    @keyframes pulseGreen {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── SORT CONTROLS ── */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .sort-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .sort-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 14px;
      border: 1px solid rgba(0,255,231,0.2);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }

    .sort-btn:hover, .sort-btn.active {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      text-shadow: 0 0 6px rgba(0,255,231,0.5);
    }

    .sort-btn.active {
      background: rgba(0,255,231,0.05);
    }

    /* Smooth card swap animation */
    .card.swap-flash {
      animation: swapFlash 0.3s ease;
    }

    @keyframes swapFlash {
      0%   { background: rgba(0,255,231,0.08); }
      100% { background: var(--bg2); }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <header>
    <p class="header-tag">// portfolio.v1</p>
    <h1>My <span>Experience</span></h1>
    <p class="subtitle">
      Security &amp; Infrastructure Engineer<br/>
      Building systems that watch, protect, and scale.<span class="cursor-blink"></span>
    </p>
  </header>

  <!-- SECTION LABEL -->
  <div class="section-label">
    <span>Projects &amp; Roles</span>
  </div>

  <!-- SORT BAR -->
  <div class="sort-bar">
    <span class="sort-label">Sort:</span>
    <button class="sort-btn active" id="sort-manual" onclick="setSort('manual')"><span>Manual ⠿</span></button>
    <button class="sort-btn" id="sort-newest" onclick="setSort('newest')"><span>Newest ↓</span></button>
    <button class="sort-btn" id="sort-oldest" onclick="setSort('oldest')"><span>Oldest ↑</span></button>
  </div>

  <!-- CARDS -->
  <div id="cards-container"></div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="btn" onclick="openModal()"><span>+ Add Entry</span></button>
  </div>

</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">// New Entry</h2>

    <div class="form-group">
      <label>Title</label>
      <input type="text" id="input-title" placeholder="e.g. AWS Mini SME-Infrastructure" />
    </div>

    <div class="form-group">
      <label>Date Range</label>
      <input type="text" id="input-date" placeholder="e.g. Dec 2025 – Feb 2026" />
    </div>

    <div class="form-group">
      <label>Bullet Points</label>
      <div id="bullets-container"></div>
      <button class="add-bullet-btn" onclick="addBulletField()">+ add bullet</button>
    </div>

    <div class="modal-actions">
      <button class="btn btn-pink" onclick="closeModal()"><span>Cancel</span></button>
      <button class="btn" id="modal-save-btn" onclick="saveEntry()"><span>Save Entry</span></button>
    </div>
  </div>
</div>

<script>
  // ── DATA ──
  const STORAGE_KEY = 'portfolio_entries_v1';

  const defaultEntries = [
    {
      id: 1,
      title: "Honeypot",
      date: "Oct 2025 – Present",
      bullets: [
        "Currently working to build a honeypot for all public ministries, institutions, and for self-interest",
        "Used Docker, React.js, Node.js, and the logs are sent to CloudFlare R2 bucket. The elastic platform is planned to be used soon"
      ]
    },
    {
      id: 2,
      title: "AWS Mini SME-Infrastructure Level Setup",
      date: "Dec 2025 – Feb 2026",
      bullets: [
        "Configured EC2 instances. Configured server using nginx as a reverse proxy, clients, attacker, and security platform dashboard.",
        "Configured Network: Internet Gateway, Nategateway, Elastic IPs, Domains, Subnetting the production network (public network) & Security (private network)",
        "Configured AWS RDS: Databases for metadata, and an S3 bucket for the main storage",
        "Configured Security: Added Elastic Agents to all instances & set up Elastic for security monitoring"
      ]
    }
  ];

  function loadEntries() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : defaultEntries;
    } catch { return defaultEntries; }
  }

  function saveEntries(list) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }

  let entries = loadEntries();
  let sortMode = 'manual'; // 'manual' | 'newest' | 'oldest'
  let dragSrcId = null;

  // ── DATE PARSING for sort ──
  const MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};

  function parseStartDate(dateStr) {
    if (!dateStr) return 0;
    // Grab the first date part (before – or -)
    const part = dateStr.split(/[–\-]/)[0].trim().toLowerCase();
    const tokens = part.split(/\s+/);
    let month = 0, year = 2000;
    for (const t of tokens) {
      const m = MONTHS[t.slice(0,3)];
      if (m !== undefined) month = m;
      const y = parseInt(t);
      if (y > 1990 && y < 2100) year = y;
    }
    return year * 100 + month;
  }

  function getSortedEntries() {
    if (sortMode === 'manual') return [...entries];
    const sorted = [...entries].sort((a, b) => {
      const da = parseStartDate(a.date);
      const db = parseStartDate(b.date);
      return sortMode === 'newest' ? db - da : da - db;
    });
    return sorted;
  }

  // ── SORT CONTROLS ──
  function setSort(mode) {
    sortMode = mode;
    ['manual','newest','oldest'].forEach(m => {
      document.getElementById('sort-' + m).classList.toggle('active', m === mode);
    });
    renderCards(true);
  }

  // ── RENDER ──
  function render() { renderCards(false); }

  function renderCards(animate) {
    const container = document.getElementById('cards-container');
    container.innerHTML = '';

    const displayList = getSortedEntries();

    if (displayList.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <span class="icon">◈</span>
          No entries yet. Add your first experience above.
        </div>`;
      return;
    }

    displayList.forEach((entry, index) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = entry.id;
      card.draggable = sortMode === 'manual';

      if (animate) {
        card.classList.add('swap-flash');
      } else {
        card.style.animationDelay = (index * 0.08) + 's';
      }

      const bulletItems = entry.bullets.map(b =>
        `<li>${escapeHtml(b)}</li>`
      ).join('');

      const handleHtml = sortMode === 'manual'
        ? `<div class="drag-handle" title="Drag to reorder">
             <span></span><span></span><span></span>
           </div>`
        : '';

      card.innerHTML = `
        ${handleHtml}
        <button class="card-edit" onclick="openEditModal(${entry.id})" title="Edit">✎ edit</button>
        <button class="card-del" onclick="deleteEntry(${entry.id})" title="Remove">✕</button>
        <div class="card-header">
          <span class="card-title">${escapeHtml(entry.title)}</span>
          <span class="card-date">${escapeHtml(entry.date)}</span>
        </div>
        <ul>${bulletItems}</ul>
      `;

      // ── DRAG EVENTS ──
      if (sortMode === 'manual') {
        card.addEventListener('dragstart', onDragStart);
        card.addEventListener('dragend',   onDragEnd);
        card.addEventListener('dragover',  onDragOver);
        card.addEventListener('dragleave', onDragLeave);
        card.addEventListener('drop',      onDrop);
      }

      container.appendChild(card);
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── DRAG HANDLERS ──
  function onDragStart(e) {
    dragSrcId = parseInt(this.dataset.id);
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }

  function onDragEnd(e) {
    this.classList.remove('dragging');
    document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
  }

  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const targetId = parseInt(this.dataset.id);
    if (targetId !== dragSrcId) {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
      this.classList.add('drag-over');
    }
  }

  function onDragLeave(e) {
    this.classList.remove('drag-over');
  }

  function onDrop(e) {
    e.preventDefault();
    const targetId = parseInt(this.dataset.id);
    if (targetId === dragSrcId) return;

    const srcIdx = entries.findIndex(en => en.id === dragSrcId);
    const tgtIdx = entries.findIndex(en => en.id === targetId);

    if (srcIdx === -1 || tgtIdx === -1) return;

    // Swap in array
    const tmp = entries[srcIdx];
    entries[srcIdx] = entries[tgtIdx];
    entries[tgtIdx] = tmp;

    saveEntries(entries);
    renderCards(true);
  }

  // ── DELETE ──
  function deleteEntry(id) {
    entries = entries.filter(e => e.id !== id);
    saveEntries(entries);
    renderCards(false);
  }

  // ── MODAL ──
  let editingId = null; // null = new entry, number = editing existing

  function openModal() {
    editingId = null;
    document.getElementById('modal-title').textContent = '// New Entry';
    document.getElementById('modal-save-btn').querySelector('span').textContent = 'Save Entry';
    document.getElementById('input-title').value = '';
    document.getElementById('input-date').value = '';
    const bc = document.getElementById('bullets-container');
    bc.innerHTML = '';
    addBulletField();
    document.getElementById('modal').classList.add('open');
    document.getElementById('input-title').focus();
  }

  function openEditModal(id) {
    const entry = entries.find(e => e.id === id);
    if (!entry) return;

    editingId = id;
    document.getElementById('modal-title').textContent = '// Edit Entry';
    document.getElementById('modal-save-btn').querySelector('span').textContent = 'Update Entry';
    document.getElementById('input-title').value = entry.title;
    document.getElementById('input-date').value = entry.date;

    const bc = document.getElementById('bullets-container');
    bc.innerHTML = '';
    entry.bullets.forEach(b => addBulletField(b));

    document.getElementById('modal').classList.add('open');
    document.getElementById('input-title').focus();
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    editingId = null;
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  function addBulletField(value = '') {
    const container = document.getElementById('bullets-container');
    const row = document.createElement('div');
    row.className = 'bullet-row';
    row.innerHTML = `
      <textarea placeholder="Describe what you did...">${value}</textarea>
      <button class="remove-bullet" onclick="removeBullet(this)" title="Remove">−</button>
    `;
    container.appendChild(row);
  }

  function removeBullet(btn) {
    const container = document.getElementById('bullets-container');
    if (container.children.length > 1) {
      btn.parentElement.remove();
    }
  }

  function saveEntry() {
    const title = document.getElementById('input-title').value.trim();
    const date  = document.getElementById('input-date').value.trim();

    if (!title) {
      document.getElementById('input-title').focus();
      return;
    }

    const bulletEls = document.querySelectorAll('#bullets-container textarea');
    const bullets = Array.from(bulletEls)
      .map(t => t.value.trim())
      .filter(Boolean);

    if (bullets.length === 0) return;

    if (editingId !== null) {
      // ── UPDATE existing entry ──
      const idx = entries.findIndex(e => e.id === editingId);
      if (idx !== -1) {
        entries[idx] = { ...entries[idx], title, date: date || 'Present', bullets };
      }
    } else {
      // ── CREATE new entry ──
      entries.unshift({ id: Date.now(), title, date: date || 'Present', bullets });
    }

    saveEntries(entries);
    renderCards(editingId !== null); // flash on edit, no flash on new
    closeModal();
  }

  // ── INIT ──
  render();
</script>
</body>
</html>
